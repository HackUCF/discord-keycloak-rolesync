services:
  discord-keycloak-rolesync:
    image: ghcr.io/hackucf/discord-keycloak-rolesync:latest
    build:
      context: .
    environment:
      DISCORD_BOT_TOKEN:
      KEYCLOAK_URL:
      KEYCLOAK_USERNAME:
      KEYCLOAK_PASSWORD:
      KEYCLOAK_REALM:
      KEYCLOAK_ADMIN_REALM:
    restart: on-failure