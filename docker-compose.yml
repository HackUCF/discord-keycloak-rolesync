services:
  discord-keycloak-rolesync:
    image: NotActuallyTerry/discord-keycloak-rolesync
    build:
      context: .
    environment:
      DISCORD_BOT_TOKEN:
      KEYCLOAK_URL:
      KEYCLOAK_USERNAME:
      KEYCLOAK_PASSWORD:
      KEYCLOAK_REALM:
      KEYCLOAK_ADMIN_REALM:
      GROUP_SYNC_INTERVAL_MINUTES: 5
      GRANTS_CONFIG: /config/grants.yaml
    volumes:
      - ./grants.yaml:/config/grants.yaml:ro
    restart: on-failure